<section id="settings" class="tab-content">
                <div class="max-width-wrapper">
                    <div class="page-header">
                        <h2 class="page-title">플랫폼 설정</h2>
                    </div>

                    <div class="fund-card" style="margin-bottom: 30px;">
                        <h3 style="margin-bottom: 20px; font-size: 16px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">👤 사용자 프로필</h3>
                        <div class="grid-2">
                            <div class="form-group"><label>사용자 성명</label><input type="text" id="set-user-name"></div>
                            <div class="form-group"><label>이메일 주소 (아이디)</label><input type="email" id="set-user-email" readonly style="background: #f1f5f9;"></div>
                            <div class="form-group"><label>소속명</label><input type="text" id="set-user-dept"></div>
                        </div>
                        <div style="text-align: right; margin-top: 15px;">
                            <button class="btn-primary" style="padding: 10px 20px; font-size: 13px;" onclick="saveProfileSettings()">프로필 저장</button>
                        </div>
                    </div>

                    <div class="fund-card" style="margin-bottom: 30px; border-top: 4px solid #ea580c;">
                        <h3 style="margin-bottom: 10px; font-size: 16px;">🔑 AI 서비스 설정 (Google Gemini)</h3>
                        <p style="font-size: 12px; color: #64748b; margin-bottom: 20px;">Google AI Studio에서 발급받은 API 키를 입력하세요. 유료 계정 사용 시 더 빠른 분석이 가능합니다.</p>
                        <div class="form-group">
                            <label>Gemini API Key</label>
                            <input type="password" id="set-api-key" placeholder="AIzaSy...">
                        </div>
                        <div style="text-align: right; margin-top: 15px;">
                            <button class="btn-primary" style="padding: 10px 20px; font-size: 13px; background: #ea580c;" onclick="saveApiSettings()">API 키 저장</button>
                        </div>
                    </div>

                    <div class="fund-card">
                        <h3 style="margin-bottom: 20px; font-size: 16px;">🔒 비밀번호 변경</h3>
                        <div class="grid-2">
                            <div class="form-group"><label>현재 비밀번호</label><input type="password" id="set-cur-pw"></div>
                            <div class="form-group"><label>새 비밀번호</label><input type="password" id="set-new-pw"></div>
                        </div>
                        <div style="text-align: right; margin-top: 15px;">
                            <button class="btn-primary" style="padding: 10px 20px; font-size: 13px; background: #475569;" onclick="savePasswordSettings()">비밀번호 변경</button>
                        </div>
                    </div>
                </div>
            </section>
